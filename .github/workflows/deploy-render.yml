# הרצה ידנית — Secrets: RENDER_API_KEY, RENDER_SERVICE_ID
# מעדכן ל-Docker (מתעלם מ-pm install) ומפעיל deploy
name: Deploy Render

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Switch service to Docker runtime
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID — add them in GitHub Secrets"
            echo "Or switch Environment to Docker manually: docs/DEPLOY-NOW-HE.md"
            exit 1
          fi
          curl -fsS -X PATCH \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceDetails": {
                "runtime": "docker",
                "dockerfilePath": "./Dockerfile",
                "dockerContext": "."
              }
            }'
          echo "Service updated to Docker runtime."

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear","deployMode":"build_and_deploy"}'
          echo "Deploy triggered."
