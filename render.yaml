# Blueprint — חובה ליצור שירות מ-Blueprint או לסנכרן קיים
# Docker מתעלם לחלוטין מ-Build Command השגוי (pm install)
services:
  - type: web
    name: artist-2-0
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GATE_SECRET
        value: JUSIC
      - key: GATE_ALLOW_SHORTCUT
        value: "true"
      - key: GATE_ALLOW_BIOMETRIC
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: NODE_ENV
        value: production
